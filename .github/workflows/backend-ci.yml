name: Backend CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore JassTournamentManager.Backend.slnx

      - name: Build
        run: dotnet build JassTournamentManager.Backend.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test JassTournamentManager.Backend.slnx --configuration Release --no-build --verbosity normal