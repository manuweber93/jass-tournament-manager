name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore JassTournamentManager.Backend.slnx

      - name: Build
        run: dotnet build JassTournamentManager.Backend.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test JassTournamentManager.Backend.slnx
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --settings ./coverlet-coverage.runsettings
          --results-directory ./TestResults

      - name: Restore local tools
        run: dotnet tool restore

      - name: Generate coverage report
        run: >
          dotnet tool run reportgenerator
          -reports:"./TestResults/**/coverage.cobertura.xml"
          -targetdir:"./coverage-report"
          -reporttypes:"Html;Cobertura;MarkdownSummaryGithub"

      - name: Publish coverage to job summary
        run: cat ./coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ./coverage-report
