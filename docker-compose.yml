version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: jass_postgres
    restart: always
    environment:
      POSTGRES_USER: jass
      POSTGRES_PASSWORD: jass_password
      POSTGRES_DB: jass_tournament_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
